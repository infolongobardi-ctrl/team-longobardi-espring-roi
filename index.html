<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcolatore ROI eSpring</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: system-ui, -apple-system, sans-serif;
  margin: 0;
  background: #0b1220;
  color: #fff;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

h1 {
  font-size: 24px;
}

.video-box {
  margin: 20px 0;
}

video {
  width: 100%;
  border-radius: 12px;
}

.cta {
  text-align: center;
  margin-top: 10px;
  font-size: 16px;
  opacity: 0.8;
}

input[type=range] {
  width: 100%;
}

.label {
  font-size: 13px;
  opacity: 0.7;
}

.value-big {
  font-size: 34px;
  font-weight: bold;
  color: #4ade80;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.primary { background: #10b981; color: white; }
.secondary { background: #374151; color: white; }

.small {
  font-size: 12px;
  opacity: 0.6;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Calcolatore ROI eSpring</h1>

<div class="video-box">
  <video controls src="presentazione-espring.mp4"></video>
  <div class="cta">Guarda come funziona</div>
  <div class="small">Il sistema di trattamento dell’acqua più venduto al mondo.</div>
</div>

<div class="card">
<label>Prezzo acqua €/L</label>
<input type="range" id="price" min="0.2" max="1" step="0.05" value="0.3">

<label>Persone</label>
<input type="range" id="people" min="1" max="6" value="4">

<label>Litri al giorno</label>
<input type="range" id="liters" min="1" max="4" value="2">

<button class="primary" onclick="calculate()">Calcola risultati</button>
<button class="secondary" onclick="share()">Condividi su WhatsApp</button>

</div>

<div id="results"></div>

<canvas id="chart"></canvas>

</div>

<script>
let lastData = null;

function calculate(){
  let price = parseFloat(document.getElementById('price').value);
  let people = parseInt(document.getElementById('people').value);
  let liters = parseFloat(document.getElementById('liters').value);

  let yearlyLiters = people * liters * 365;
  let costBottle = yearlyLiters * price;

  let systemCost = 1500;
  let savings = costBottle - 200;

  let years = systemCost / savings;

  let bottles = Math.round(yearlyLiters / 0.5);

  lastData = {people, yearlyLiters, savings, years, bottles};

  document.getElementById('results').innerHTML = `
    <div class="card">
      <div class="label">Risparmio stimato</div>
      <div class="value-big">€ ${Math.round(savings * 5)}</div>
    </div>

    <div class="card">
      <div class="label">Break-even (rientro dell’investimento)</div>
      <div>${years.toFixed(1)} anni</div>
    </div>

    <div class="card">
      <div class="label">Riduzione dell’uso di plastica monouso</div>
      <div class="small">(≈ ${bottles} bottiglie da 500 ml evitate ogni anno)</div>
    </div>
  `;

  buildChart(costBottle);
}

function buildChart(cost){
  new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: ['1y','2y','3y','4y','5y'],
      datasets: [{
        label: 'Costo bottiglie',
        data: [cost, cost*2, cost*3, cost*4, cost*5],
        borderColor: 'red'
      }]
    }
  });
}

function share(){
  if(!lastData) return;

  const text = `
*Riepilogo consulenza eSpring*

Persone: ${lastData.people}
Consumo: ${Math.round(lastData.yearlyLiters)} L/anno

*Risparmio stimato:* € ${Math.round(lastData.savings*5)}
*Break-even:* ${lastData.years.toFixed(1)} anni

Hai 90 giorni per provarlo: rimborso completo.

Puoi approfondire qui: www.espring.com
`;

  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}
</script>

</body>
</html>
